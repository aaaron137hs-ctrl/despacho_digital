<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Mis Expedientes - Despacho Digital</title>
</head>
<body class="bg-light text-dark">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">📂 Gestor de Expedientes</span>
            <a href="/admin/expedientes/caso/add/" class="btn btn-outline-light btn-sm">+ Agregar desde Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            {% for caso in casos %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ caso.titulo }}</h5>
                        <p class="card-text mb-1"><strong>Cliente:</strong> {{ caso.cliente }}</p>
                        <p class="card-text text-muted">{{ caso.descripcion }}</p>

                        <div class="mt-3 pt-3 border-top">
                            <a href="{% url 'editar' caso.id %}" class="btn btn-warning btn-sm">Editar</a>
                            
                            <a href="{% url 'borrar' caso.id %}" 
                               class="btn btn-danger btn-sm" 
                               onclick="return confirm('¿Seguro que quieres borrar este expediente? Esta acción no se puede deshacer.')">
                               Borrar
                            </a>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0">
                        <small class="text-secondary">📅 Registrado: {{ caso.creado_el|date:"d/m/Y" }}</small>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center">
                <div class="alert alert-info">
                    Aún no hay casos registrados en el sistema.
                </div>
            </div>
            {% endfor %}
        </div>
        
        <div class="text-center mt-5 mb-5">
            <hr>
            <a href="/admin/" class="btn btn-secondary btn-sm">Acceso Administrador</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
